<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel admina</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 30px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2, h3 {
  margin-top: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 5px;
}

button:hover {
  background: #333;
}

.hidden {
  display: none;
}

.review-item {
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}
</style>

</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>🔐 Logowanie</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Hasło">
    <button onclick="login()">Zaloguj</button>
  </div>

  <!-- PANEL -->
  <div id="panelBox" class="hidden">

    <h2>⚙️ Panel strony</h2>

    <!-- STATYSTYKI -->
    <h3>Liczby</h3>
    <input id="clients" placeholder="Zadowoleni klienci">
    <input id="fabrics" placeholder="Tkaniny">

    <h3>Kalendarz</h3>
    <input id="busyDays" placeholder="np. 3,4,18">

    <h3>TikTok</h3>
    <input id="t1" placeholder="Link TikTok 1">
    <input id="t2" placeholder="Link TikTok 2">
    <input id="t3" placeholder="Link TikTok 3">

    <button onclick="save()">💾 Zapisz zmiany</button>

    <hr>

    <!-- ⭐ OPINIE -->
    <h2>⭐ Opinie</h2>

    <input id="r_name" placeholder="Imię i nazwisko">
    <input id="r_text" placeholder="Treść opinii">
    <input id="r_stars" type="number" min="1" max="5" placeholder="Gwiazdki (1-5)">

    <button onclick="addReview()">➕ Dodaj opinię</button>

    <hr>

    <div id="reviewsList"></div>

    <button onclick="logout()">🚪 Wyloguj</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  addDoc,
  getDocs,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBUU4jcNfegYzyQwAfdUu2mtR7tEnaVN1w",
  authDomain: "panel-wow.firebaseapp.com",
  projectId: "panel-wow"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

////////////////////////////////////////////////////
// 🔐 LOGIN
////////////////////////////////////////////////////

window.login = async () => {
  try {
    await setPersistence(auth, browserLocalPersistence);
    await signInWithEmailAndPassword(auth, email.value, password.value);

    showPanel();
  } catch (e) {
    alert("Błąd logowania");
  }
};

onAuthStateChanged(auth, (user) => {
  if (user) showPanel();
  else showLogin();
});

function showPanel() {
  loginBox.classList.add("hidden");
  panelBox.classList.remove("hidden");

  loadData();
  loadReviews();
}

function showLogin() {
  loginBox.classList.remove("hidden");
  panelBox.classList.add("hidden");
}

////////////////////////////////////////////////////
// 📥 SETTINGS
////////////////////////////////////////////////////

async function loadData() {
  const snap = await getDoc(doc(db, "settings", "main"));
  const d = snap.data();
  if (!d) return;

  clients.value = d.clients || '';
  fabrics.value = d.fabrics || '';
  busyDays.value = d.busyDays || '';

  t1.value = d.tiktok1 || '';
  t2.value = d.tiktok2 || '';
  t3.value = d.tiktok3 || '';
}

window.save = async () => {
  await setDoc(doc(db, "settings", "main"), {
    clients: Number(clients.value),
    fabrics: Number(fabrics.value),
    busyDays: busyDays.value,
    tiktok1: t1.value,
    tiktok2: t2.value,
    tiktok3: t3.value
  });

  alert("Zapisano!");
};

////////////////////////////////////////////////////
// ⭐ OPINIE
////////////////////////////////////////////////////

async function loadReviews() {
  const snap = await getDocs(collection(db, "reviews"));
  const list = document.getElementById("reviewsList");

  list.innerHTML = "";

  snap.forEach((docSnap) => {
    const r = docSnap.data();

    const div = document.createElement("div");
    div.className = "review-item";

    const stars = "⭐".repeat(r.stars || 0);

    div.innerHTML = `
      <strong>${r.name}</strong> ${stars}
      <p>${r.text}</p>
      <button onclick="deleteReview('${docSnap.id}')">🗑 Usuń</button>
    `;

    list.appendChild(div);
  });
}

window.addReview = async () => {
  if (!r_name.value || !r_text.value || !r_stars.value) {
    alert("Uzupełnij dane!");
    return;
  }

  await addDoc(collection(db, "reviews"), {
    name: r_name.value,
    text: r_text.value,
    stars: Number(r_stars.value),
    date: Date.now(),
    avatar: ""
  });

  r_name.value = "";
  r_text.value = "";
  r_stars.value = "";

  loadReviews();
};

window.deleteReview = async (id) => {
  if (!confirm("Usunąć opinię?")) return;

  await deleteDoc(doc(db, "reviews", id));
  loadReviews();
};

////////////////////////////////////////////////////
// 🚪 LOGOUT
////////////////////////////////////////////////////

window.logout = async () => {
  await signOut(auth);
};

</script>

</body>
</html>
