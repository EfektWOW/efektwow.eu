<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel admina</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 30px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 5px;
}

button:hover {
  background: #333;
}

.hidden {
  display: none;
}
</style>

</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>🔐 Logowanie</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Hasło">
    <button onclick="login()">Zaloguj</button>
  </div>

  <!-- PANEL -->
  <div id="panelBox" class="hidden">
    <h2>⚙️ Panel strony</h2>

    <h3>Liczby</h3>
    <input id="clients" placeholder="Zadowoleni klienci">
    <input id="fabrics" placeholder="Tkaniny">
    <input id="reviews" placeholder="Opinie">

    <h3>Kalendarz</h3>
    <input id="busyDays" placeholder="np. 3,4,18">

    <h3>TikTok</h3>
    <input id="t1" placeholder="Link TikTok 1">
    <input id="t2" placeholder="Link TikTok 2">
    <input id="t3" placeholder="Link TikTok 3">

    <button onclick="save()">💾 Zapisz zmiany</button>
    <button onclick="logout()">🚪 Wyloguj</button>
  </div>

</div>

<div id="reviewModal" class="hidden">
  <div class="container">

    <h3>Dodaj opinię</h3>

    <input id="r_name" placeholder="Imię i nazwisko">
    <input id="r_date" placeholder="Data (np. 19.03.2026)">
    <input id="r_stars" type="number" min="1" max="5" placeholder="Gwiazdy (1-5)">
    <textarea id="r_text" placeholder="Treść opinii"></textarea>

    <button onclick="addReview()">Zapisz</button>
    <button onclick="closeReviewModal()">Anuluj</button>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  addDoc,
  deleteDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBUU4jcNfegYzyQwAfdUu2mtR7tEnaVN1w",
  authDomain: "panel-wow.firebaseapp.com",
  projectId: "panel-wow"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();


// =======================
// 🔐 LOGIN
// =======================
window.login = async () => {
  try {
    await setPersistence(auth, browserLocalPersistence);
    await signInWithEmailAndPassword(auth, email.value, password.value);

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panelBox").classList.remove("hidden");

    loadData();

  } catch (e) {
    alert("Błąd logowania");
    console.log(e);
  }
};


// =======================
// 📥 AUTO LOGIN
// =======================
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panelBox").classList.remove("hidden");

    loadData();
    loadReviews(); // ⭐ WAŻNE

  } else {
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("panelBox").classList.add("hidden");
  }
});


// =======================
// 📥 SETTINGS
// =======================
async function loadData() {
  const snap = await getDoc(doc(db, "settings", "main"));
  const d = snap.data();
  if (!d) return;

  clients.value = d.clients || '';
  fabrics.value = d.fabrics || '';
  reviews.value = d.reviews || '';
  busyDays.value = d.busyDays || '';

  t1.value = d.tiktok1 || '';
  t2.value = d.tiktok2 || '';
  t3.value = d.tiktok3 || '';
}


// =======================
// 💾 SAVE SETTINGS
// =======================
window.save = async () => {
  await setDoc(doc(db, "settings", "main"), {
    clients: Number(clients.value),
    fabrics: Number(fabrics.value),
    reviews: Number(reviews.value),
    busyDays: busyDays.value,
    tiktok1: t1.value,
    tiktok2: t2.value,
    tiktok3: t3.value
  });

  alert("Zapisano!");
};


// =======================
// 🚪 LOGOUT
// =======================
window.logout = async () => {
  await signOut(auth);
  alert("Wylogowano!");
};


// =======================
// 🪟 MODAL
// =======================
window.openReviewModal = () => {
  document.getElementById("reviewModal").classList.remove("hidden");
};

window.closeReviewModal = () => {
  document.getElementById("reviewModal").classList.add("hidden");
};


// =======================
// ➕ ADD REVIEW
// =======================
window.addReview = async () => {
  const name = r_name.value;
  const date = r_date.value;
  const stars = r_stars.value;
  const text = r_text.value;

  const cleanName = name.replace(/\s+/g, "");
  const avatar = `https://ui-avatars.com/api/?name=${cleanName}&background=random`;

  await addDoc(collection(db, "reviews"), {
    name,
    date,
    stars: Number(stars),
    text,
    avatar
  });

  closeReviewModal();

  r_name.value = "";
  r_date.value = "";
  r_stars.value = "";
  r_text.value = "";
};


// =======================
// 📥 LOAD REVIEWS (REALTIME)
// =======================
function loadReviews() {
  const q = collection(db, "reviews");

  onSnapshot(q, (snap) => {
    const box = document.getElementById("reviewsList");
    box.innerHTML = "";

    snap.forEach((d) => {
      const r = d.data();

      const div = document.createElement("div");
      div.style.border = "1px solid #ddd";
      div.style.padding = "10px";
      div.style.margin = "10px 0";
      div.style.borderRadius = "8px";

      div.innerHTML = `
        <img src="${r.avatar}" width="40" style="border-radius:50%; vertical-align:middle;">
        <b>${r.name}</b> (${r.stars}⭐)
        <br>
        <small>${r.date}</small>
        <p>${r.text}</p>

        <button onclick="deleteReview('${d.id}')">Usuń</button>
      `;

      box.appendChild(div);
    });
  });
}


// =======================
// 🗑 DELETE REVIEW
// =======================
window.deleteReview = async (id) => {
  if (!confirm("Na pewno usunąć opinię?")) return;

  await deleteDoc(doc(db, "reviews", id));
};

</script>


</body>
</html>
